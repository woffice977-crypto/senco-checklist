<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENCO 驗身報告 - 團隊協作檢測</title>
    <style>
        :root {
            --primary-grow: #2ecc71;
            --primary-dark: #27ae60;
            --secondary-support: #f39c12;
            --bg-light: #f4f9f6;
            --card-white: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --shadow-subtle: 0 10px 30px rgba(46, 204, 113, 0.05);
            --border-color: #e0e6ed;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.8;
            margin: 0;
            padding: 20px;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(to right, var(--primary-grow), var(--secondary-support));
        }

        .container {
            max-width: 850px;
            margin: 40px auto;
            background: var(--card-white);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: var(--shadow-subtle);
            position: relative;
            overflow: hidden;
        }

        .container::after {
            content: '📋';
            position: absolute;
            bottom: -20px;
            right: -20px;
            font-size: 150px;
            opacity: 0.03;
            transform: rotate(-15deg);
        }

        .header-area {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
            z-index: 1;
        }

        .header-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            display: inline-block;
        }

        h2 {
            color: var(--text-main);
            font-size: 28px;
            margin: 10px 0;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.05em;
            max-width: 650px;
            margin: 0 auto;
        }

        .section-title {
            background: #f8fbf9;
            padding: 10px 20px;
            border-radius: 8px;
            color: var(--primary-dark);
            font-weight: bold;
            margin: 40px 0 20px 0;
            display: flex; /* 使用 flex 讓文字和 Emoji 對齊 */
            align-items: center;
            border-left: 4px solid var(--primary-grow);
            font-size: 1.1em;
        }

        /* 針對標題內圖案的樣式微調 */
        .section-icon {
            font-size: 1.3em;
            margin-left: 8px;
            font-style: normal; /* 防止 Emoji 變斜體 */
        }

        .question-card {
            background: var(--card-white);
            border: 1px solid var(--border-color);
            border-left: 5px solid var(--border-color);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .question-card.answered {
            border-left-color: var(--primary-grow);
            background-color: #f0fff4;
        }

        .question-text {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
        }

        .question-number {
            background-color: #eafaf1;
            color: var(--primary-grow);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 0.85em;
            flex-shrink: 0;
        }

        .rating-container {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
        }

        .rating-item {
            flex: 1;
            min-width: 120px;
        }

        .rating-item input { display: none; }

        .rating-item label {
            display: block;
            padding: 10px 5px;
            text-align: center;
            background: #f8fbf9;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.82em;
            border: 2px solid #edf2f0;
            transition: all 0.2s ease;
        }

        .rating-item[data-val="1"] input:checked + label { background: #e74c3c; color: white; border-color: #c0392b; }
        .rating-item[data-val="2"] input:checked + label { background: #e67e22; color: white; border-color: #d35400; }
        .rating-item[data-val="3"] input:checked + label { background: #f1c40f; color: white; border-color: #f39c12; }
        .rating-item[data-val="4"] input:checked + label { background: #3498db; color: white; border-color: #2980b9; }
        .rating-item[data-val="5"] input:checked + label { background: #2ecc71; color: white; border-color: #27ae60; }
