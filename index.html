<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SENCO 驗身報告 - 團隊協作檢測</title>
  <style>
    :root {
      --primary-grow: #2ecc71;
      --primary-dark: #27ae60;
      --secondary-support: #f39c12;
      --bg-light: #f4f9f6;
      --card-white: #ffffff;
      --text-main: #2c3e50;
      --text-muted: #7f8c8d;
      --shadow-subtle: 0 10px 30px rgba(46, 204, 113, 0.05);
      --border-color: #e0e6ed;
    }

    body {
      font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
      background-color: var(--bg-light);
      color: var(--text-main);
      line-height: 1.8;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 850px;
      margin: 40px auto;
      background: var(--card-white);
      padding: 50px 40px;
      border-radius: 24px;
      box-shadow: var(--shadow-subtle);
      position: relative;
    }

    .header-area {
      text-align: center;
      margin-bottom: 50px;
    }

    .category-tag {
      display: inline-block;
      padding: 4px 12px;
      background: #eafaf1;
      color: var(--primary-dark);
      border-radius: 6px;
      font-size: 0.85em;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .question-card {
      background: var(--card-white);
      border: 1px solid var(--border-color);
      border-left: 5px solid var(--border-color);
      padding: 25px;
      border-radius: 16px;
      margin-bottom: 25px;
    }

    .question-card.answered { border-left-color: var(--primary-grow); background-color: #f0fff4; }

    .rating-container { display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap; margin-top: 15px; }

    .rating-item { flex: 1; min-width: 120px; }
    .rating-item input { display: none; }
    .rating-item label {
      display: block;
      padding: 10px 5px;
      text-align: center;
      background: #f8fbf9;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.8em;
      border: 2px solid #edf2f0;
    }

    .rating-item[data-val="5"] input:checked + label { background: #4a5568; color: white; }
    .rating-item[data-val="4"] input:checked + label { background: #718096; color: white; }
    .rating-item[data-val="3"] input:checked + label { background: #a0aec0; color: white; }
    .rating-item[data-val="2"] input:checked + label { background: #68d391; color: white; }
    .rating-item[data-val="1"] input:checked + label { background: #38a169; color: white; }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--primary-grow) 0%, var(--primary-dark) 100%);
      color: white;
      border: none;
      padding: 18px;
      font-size: 1.2em;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 30px;
    }

    #result { margin-top: 50px; padding: 40px; border-radius: 20px; display: none; text-align: left; border: 2px solid; }
    .score-display { font-size: 48px; font-weight: bold; text-align: center; margin: 20px 0; }
    .suggestion-box { background: rgba(255,255,255,0.6); padding: 20px; border-radius: 12px; margin-top: 20px; }
    ul { padding-left: 20px; }
  </style>
</head>
<body>

<div class="container">
  <div class="header-area">
    <h2>🩺 SENCO 驗身報告</h2>
    <p class="subtitle">分數愈低，代表 SENCO 獨自承擔較多職務；<br>分數愈高，代表團隊較能共同承擔職責。</p>
  </div>

  <form id="quizForm">
    <div id="questionsContainer"></div>
    <button type="button" class="submit-btn" onclick="calculate()">提交報告 • 查看診斷結果</button>
  </form>

  <div id="result">
    <div id="resultTitle" style="font-size: 1.8em; font-weight: bold; text-align: center;"></div>
    <div class="score-display" id="finalScore"></div>
    <div id="resultDesc"></div>
    <div class="suggestion-box">
      <strong>💡 建議方向：</strong>
      <ul id="suggestionList"></ul>
    </div>
  </div>
</div>

<script>
  // 根據文件 [cite: 8-21] 整理的題目
  const questions = [
    { cat: "行政規劃(大腦)", q: "支援項目的構思、規劃及檢討工作，主要由 SENCO 一人統籌負責。" },
    { cat: "工作執行(四肢)", q: "學生支援組的大部分行政工作，主要由 SENCO 獨自執行和處理。" },
    { cat: "工作執行(四肢)", q: "第二層支援的外購服務，主要由 SENCO 負責聯繫及監察。" },
    { cat: "工作執行(四肢)", q: "校內超過一半的個別學習計劃(IEP)由 SENCO 親自撰寫或主導完成。" },
    { cat: "工作執行(四肢)", q: "學生支援組其他成員不太熟悉 SEMIS 的介面及操作。" },
    { cat: "校情文化(耳朵)", q: "當家長就 SEN 相關事宜作出查詢時，校務處同事通常會直接轉介由 SENCO 回應。" },
    { cat: "校情文化(耳朵)", q: "當出現突發的情況（如特殊教育需要學生情緒激動）時，大部分同事會第一時間尋求 SENCO 的協助。" },
    { cat: "校情文化(耳朵)", q: "學校大部分持分者(教師、家長、學生) 不清楚誰人擔任 SENST 及其職責。" },
    { cat: "校情文化(耳朵)", q: "當遇上較複雜的情況（如家長關注、學生衝突、工作安排等），可與 SENCO 共同商討對策的校內同工相對較少。" },
    { cat: "個人狀態(心臟)", q: "SENCO 經常因需處理大量日常及突發工作，而難以在工作時間內安排休息或用膳時間。" }
  ];

  const options = [
    { val: 5, text: "完全不符合" },
    { val: 4, text: "不太符合" },
    { val: 3, text: "部分符合" },
    { val: 2, text: "頗為符合" },
    { val: 1, text: "非常符合" }
  ];

  const container = document.getElementById('questionsContainer');
  questions.forEach((item, index) => {
    const qIndex = index + 1;
    let html = `
      <div class="question-card" id="card_q${qIndex}">
        <span class="category-tag">${item.cat}</span>
        <div style="font-weight:600; font-size:1.1em;">${qIndex}. ${item.q}</div>
        <div class="rating-container">`;
    options.forEach(opt => {
      html += `
        <div class="rating-item" data-val="${opt.val}">
          <input type="radio" name="q${qIndex}" id="q${qIndex}_${opt.val}" value="${opt.val}" required onclick="markAsAnswered(${qIndex})">
          <label for="q${qIndex}_${opt.val}">${opt.val}<br>${opt.text}</label>
        </div>`;
    });
    html += `</div></div>`;
    container.innerHTML += html;
  });

  function markAsAnswered(index) { document.getElementById(`card_q${index}`).classList.add('answered'); }

  function calculate() {
    const form = document.getElementById('quizForm');
    const formData = new FormData(form);
    let total = 0, count = 0;
    for (let v of formData.values()) { total += parseInt(v); count++; }

    if (count < 10) { alert("請完成所有 10 條評分題目。"); return; }

    const resDiv = document.getElementById("result");
    const resTitle = document.getElementById("resultTitle");
    const resDesc = document.getElementById("resultDesc");
    const sugList = document.getElementById("suggestionList");
    
    document.getElementById("finalScore").innerText = total;
    sugList.innerHTML = "";
    resDiv.style.display = "block";

    // 四段式評分邏輯 [cite: 24-54]
    if (total <= 20) {
      resTitle.innerText = "❤️ 默默耕耘的孤勇者";
      resDesc.innerText = "你的付出與專業絕對是學校的重要支柱。目前大部分行政工作與專業支援均由你獨自承擔，這反映了學校對你的依賴。然而，長期高強度工作模式可能會影響身心健康。";
      const sugs = ["與管理層商討重新釐清 SENST 職責分工", "將部分執行層面工作逐步授權（如 SEMIS 操作）", "為自己保留時間處理策略性工作"];
      sugs.forEach(s => sugList.innerHTML += `<li>${s}</li>`);
      resDiv.style.cssText += "background:#fff5f5; border-color:#feb2b2; color:#c53030; display:block;";
    } else if (total <= 30) {
      resTitle.innerText = "💡 初步協作模式";
      resDesc.innerText = "團隊已建立很好的分工雛形！目前部分核心工作仍較為集中以確保穩定性，但在靈活度上仍有優化空間。";
      const sugs = ["建立透明資訊共享機制（如開放 SEMIS 權限）", "讓團隊成員清楚「可以做到什麼程度」", "定期與團隊檢視分工，肯定同工貢獻"];
      sugs.forEach(s => sugList.innerHTML += `<li>${s}</li>`);
      resDiv.style.cssText += "background:#fffaf0; border-color:#fbd38d; color:#9c4221; display:block;";
    } else if (total <= 40) {
      resTitle.innerText = "🌱 穩健協作模式";
      resDesc.innerText = "恭喜你建立了不錯的協作基礎！你已能有效運用 SENST 資源，整體工作分配相對均衡。";
      const sugs = ["提升團隊處理突發事件的自主判斷能力", "透過定期個案檢討提供回饋", "角色從「主要執行者」轉向「協調者與專業顧問」"];
      sugs.forEach(s => sugList.innerHTML += `<li>${s}</li>`);
      resDiv.style.cssText += "background:#f0fff4; border-color:#9ae6b4; color:#22543d; display:block;";
    } else {
      resTitle.innerText = "👑 卓越賦權模式";
      resDesc.innerText = "這是非常理想的狀態！你不再是唯一的承擔者，而是帶領方向的專業領袖。這種模式能確保支援服務的持續性。";
      const sugs = ["鞏固優良團隊文化，將成功經驗系統化", "加強後備力量培育", "與校內外同工分享協作模式經驗"];
      sugs.forEach(s => sugList.innerHTML += `<li>${s}</li>`);
      resDiv.style.cssText += "background:#ebf8ff; border-color:#90cdf4; color:#2a4365; display:block;";
    }
    resDiv.scrollIntoView({ behavior: 'smooth' });
  }
</script>
</body>
</html>
